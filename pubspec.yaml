name: rfid_project
description: "Password vault app using RFID technology for secure access control and management of sensitive information."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_vector_icons: ^2.0.0
  google_fonts: ^6.1.0
  appwrite: ^14.0.0
  flutter_dotenv: ^5.1.0
  encrypt: ^5.0.3
  crypto: ^3.0.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/
